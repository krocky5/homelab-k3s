# Apply manually: kubectl apply -f argocd/argocd-cm.yaml
#
# Authentik app slug: "argocd"
# Redirect URI: https://argocd.krockysphere.com/auth/callback
# Add "groups" scope mapping in Authentik provider property mappings.
#
# rootCA is the long-lived self-signed cert stored in the authentik/authentik-tls
# secret, which Traefik serves for auth.krockysphere.com. Pods reach that host via
# CoreDNS override → Traefik ClusterIP. Cloudflare handles public-facing TLS; this
# pin only covers in-cluster calls. Cert expires 2036-04-18 — rotate before then.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: "https://argocd.krockysphere.com"
  oidc.config: |
    name: Authentik
    issuer: https://auth.krockysphere.com/application/o/argocd/
    clientID: ARGOCD_CLIENT_ID
    clientSecret: $oidc.authentik.clientSecret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
    requestedIDTokenClaims:
      groups:
        essential: true
    rootCA: |
