# Apply manually: kubectl apply -f argocd/argocd-cm.yaml
#
# Authentik app slug: "argocd"
# Redirect URI: https://argocd.krockysphere.com/auth/callback
# Add "groups" scope mapping in Authentik provider property mappings.
#
# rootCA is Traefik's internal self-signed cert. Pods reach auth.krockysphere.com
# via CoreDNS override → Traefik ClusterIP, which presents this cert internally.
# Cloudflare handles the public-facing TLS; this is only needed for in-cluster calls.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: "https://argocd.krockysphere.com"
  oidc.config: |
    name: Authentik
    issuer: https://auth.krockysphere.com/application/o/argocd/
    clientID: ARGOCD_CLIENT_ID
    clientSecret: $oidc.authentik.clientSecret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
    requestedIDTokenClaims:
      groups:
        essential: true
    rootCA: |
