apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-crucible
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    chart: gha-runner-scale-set
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    targetRevision: 0.10.1
    helm:
      releaseName: crucible-runners
      values: |
        # Repo-scoped runner (ARC doesn't support user-account scope).
        # crucible-ops uses GitHub-hosted runners for lint — cheap enough not
        # to need a second scale set.
        githubConfigUrl: https://github.com/krocky5/crucible
        githubConfigSecret: crucible-arc-pat   # must exist in arc-runners ns
        runnerScaleSetName: homelab-k3s

        maxRunners: 3
        minRunners: 0

        # Rootless kubernetes mode — no DinD, no privileged. ARC schedules a
        # Job pod per workflow step using kubectl exec from the runner pod.
        containerMode:
          type: kubernetes
          kubernetesModeWorkVolumeClaim:
            accessModes: [ReadWriteOnce]
            storageClassName: local-path
            resources:
              requests:
                storage: 10Gi

        controllerServiceAccount:
          namespace: arc-systems
          name: arc-gha-rs-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
