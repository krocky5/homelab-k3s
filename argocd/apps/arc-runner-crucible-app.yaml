apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-crucible
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    chart: gha-runner-scale-set
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    targetRevision: 0.10.1
    helm:
      releaseName: crucible-runners
      values: |
        # Repo-scoped runner (ARC doesn't support user-account scope).
        githubConfigUrl: https://github.com/krocky5/crucible
        githubConfigSecret: crucible-arc-pat
        runnerScaleSetName: homelab-k3s

        maxRunners: 3
        minRunners: 0

        # No containerMode — jobs run directly in the runner pod. The
        # kubernetes containerMode forces ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER=true
        # and demands a `container:` spec on every job, which our workflows
        # don't use. Running jobs in the runner pod is fine — the pod is
        # ephemeral and lives in an isolated namespace.
        template:
          spec:
            restartPolicy: Never
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                volumeMounts:
                  - name: work
                    mountPath: /home/runner/_work
            volumes:
              - name: work
                emptyDir: {}

        controllerServiceAccount:
          namespace: arc-systems
          name: arc-gha-rs-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
