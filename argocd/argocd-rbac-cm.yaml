# ArgoCD RBAC - maps Authentik groups to ArgoCD roles.
# Apply manually: kubectl apply -f argocd/argocd-rbac-cm.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    g, homelab-admin, role:admin
    g, homelab-user, role:readonly
