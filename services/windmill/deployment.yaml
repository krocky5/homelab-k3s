apiVersion: apps/v1
kind: Deployment
metadata:
  name: windmill
  namespace: windmill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: windmill
  template:
    metadata:
      labels:
        app: windmill
    spec:
      imagePullSecrets:
        - name: windmill-regcred
      containers:
        - name: windmill
          image: ghcr.io/windmill-labs/windmill:main
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: windmill-db-secret
                  key: database_url
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: windmill-db-secret
                  key: password
            - name: BASE_URL
              value: "https://windmill.krockysphere.com"
            # Mount oauth.json for OIDC login via Authentik.
            # After applying windmill-oauth-config.yaml, users see "Login with Authentik" instead of password prompt.
            - name: OAUTH_JSON_PATH
              value: "/etc/windmill/oauth.json"
          volumeMounts:
            - name: oauth-config
              mountPath: /etc/windmill
              readOnly: true
          ports:
            - containerPort: 8000
      volumes:
        - name: oauth-config
          secret:
            secretName: windmill-oauth-secret
