apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: homarr-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      containers:
      - name: homarr
        image: ghcr.io/homarr-labs/homarr:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: TZ
          value: "America/New_York"
        - name: SECRET_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: homarr-secrets
              key: secret-encryption-key
        - name: HOSTNAME
          value: "0.0.0.0"
        # OIDC via Authentik - users sign in through Authentik, no separate Homarr password
        # Create the Authentik provider with redirect URI: https://home.krockysphere.com/api/auth/callback/oidc
        # Authentik app slug: "homarr"
        - name: AUTH_PROVIDERS
          value: "oidc"
        - name: AUTH_OIDC_ISSUER
          valueFrom:
            secretKeyRef:
              name: homarr-oidc-secret
              key: issuer
        - name: AUTH_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: homarr-oidc-secret
              key: client-id
        - name: AUTH_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: homarr-oidc-secret
              key: client-secret
        - name: AUTH_OIDC_ADMIN_GROUP
          value: "homelab-admin"
        - name: AUTH_OIDC_OWNER_GROUP
          value: "homelab-admin"
        # Trust the self-signed cert Traefik serves for auth.krockysphere.com
        # (in-cluster path via CoreDNS override). See authentik-ca ConfigMap.
        - name: NODE_EXTRA_CA_CERTS
          value: "/etc/ssl/authentik/ca.crt"
        volumeMounts:
        - name: data
          mountPath: /appdata
        - name: assets
          mountPath: /app/public/imgs
        - name: authentik-ca
          mountPath: /etc/ssl/authentik
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: homarr-v1-data-pvc
      - name: assets
        persistentVolumeClaim:
          claimName: homarr-v1-assets-pvc
      - name: authentik-ca
        configMap:
          name: authentik-ca
